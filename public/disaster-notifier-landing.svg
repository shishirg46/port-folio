<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#151A24"/>
      <stop offset="100%" stop-color="#1D2433"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4433" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF4433" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="pageClip"><rect x="0" y="40" width="1200" height="760" rx="0"/></clipPath>
  </defs>

  <!-- browser window frame -->
  <rect x="0" y="0" width="1200" height="800" rx="14" fill="#0D1017"/>
  <rect x="1" y="1" width="1198" height="798" rx="13" fill="none" stroke="#2A3140" stroke-width="1"/>

  <!-- browser chrome bar -->
  <rect x="0" y="0" width="1200" height="40" rx="14" fill="#171B24"/>
  <rect x="0" y="26" width="1200" height="14" fill="#171B24"/>
  <circle cx="24" cy="20" r="6" fill="#FF5F57"/>
  <circle cx="46" cy="20" r="6" fill="#FEBC2E"/>
  <circle cx="68" cy="20" r="6" fill="#28C840"/>
  <rect x="440" y="9" width="320" height="22" rx="11" fill="#0D1017"/>
  <text x="600" y="24" font-family="Arial, sans-serif" font-size="12" fill="#6B7385" text-anchor="middle">safealert.app</text>

  <g clip-path="url(#pageClip)">
    <rect x="0" y="40" width="1200" height="760" fill="#0F1218"/>

    <!-- site nav -->
    <g transform="translate(0,40)">
      <rect x="0" y="0" width="1200" height="72" fill="#12161F"/>
      <rect x="0" y="71" width="1200" height="1" fill="#232938"/>
      <circle cx="60" cy="36" r="12" fill="#FF5533"/>
      <text x="82" y="41" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#F5F5F0">SafeAlert</text>

      <text x="480" y="41" font-family="Arial, sans-serif" font-size="15" fill="#AEB4C0">Home</text>
      <text x="560" y="41" font-family="Arial, sans-serif" font-size="15" fill="#AEB4C0">Live Alerts</text>
      <text x="672" y="41" font-family="Arial, sans-serif" font-size="15" fill="#AEB4C0">Donate</text>
      <text x="752" y="41" font-family="Arial, sans-serif" font-size="15" fill="#AEB4C0">About</text>

      <rect x="1000" y="20" width="140" height="34" rx="8" fill="#FF5533"/>
      <text x="1070" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#0D1017" text-anchor="middle">Get Notified</text>
    </g>

    <!-- hero -->
    <rect x="0" y="112" width="1200" height="430" fill="url(#heroGrad)"/>
    <circle cx="880" cy="320" r="230" fill="url(#pulse)"/>

    <g transform="translate(80,112)">
      <rect x="0" y="46" width="190" height="28" rx="14" fill="#1C2230" stroke="#2DD4A0" stroke-width="1"/>
      <circle cx="20" cy="60" r="5" fill="#2DD4A0"/>
      <text x="34" y="65" font-family="Arial, sans-serif" font-size="13" fill="#2DD4A0">LIVE · 3 active alerts</text>

      <text x="0" y="150" font-family="'Arial Black', Arial, sans-serif" font-size="48" font-weight="900" fill="#F5F5F0">Know the moment</text>
      <text x="0" y="205" font-family="'Arial Black', Arial, sans-serif" font-size="48" font-weight="900" fill="#F5F5F0">disaster <tspan fill="#FF5533">strikes.</tspan></text>

      <text x="0" y="250" font-family="Arial, sans-serif" font-size="17" fill="#9AA3B2">Real-time alerts, instant relief donations, and a calmer</text>
      <text x="0" y="276" font-family="Arial, sans-serif" font-size="17" fill="#9AA3B2">way through emergencies — built on the MERN stack.</text>

      <rect x="0" y="308" width="176" height="48" rx="8" fill="#FF5533"/>
      <text x="88" y="337" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0D1017" text-anchor="middle">View Live Map</text>

      <rect x="192" y="308" width="176" height="48" rx="8" fill="none" stroke="#3A4256" stroke-width="1.5"/>
      <text x="280" y="337" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#F5F5F0" text-anchor="middle">Donate Now</text>
    </g>

    <!-- live alert feed card, right side of hero -->
    <g transform="translate(760,180)">
      <rect width="360" height="300" rx="14" fill="#151A24" stroke="#2A3140"/>
      <text x="24" y="38" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#F5F5F0">Live Alert Feed</text>
      <circle cx="336" cy="33" r="5" fill="#2DD4A0"/>

      <g transform="translate(20,58)">
        <rect width="320" height="66" rx="10" fill="#1C2230"/>
        <circle cx="26" cy="33" r="10" fill="#FF5533"/>
        <text x="48" y="27" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#F5F5F0">Flood Warning — Ward 4</text>
        <text x="48" y="45" font-family="Arial, sans-serif" font-size="11" fill="#8891A2">Issued 2 min ago · High severity</text>
      </g>
      <g transform="translate(20,134)">
        <rect width="320" height="66" rx="10" fill="#1C2230"/>
        <circle cx="26" cy="33" r="10" fill="#FFB238"/>
        <text x="48" y="27" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#F5F5F0">Landslide Risk — Hill Rd</text>
        <text x="48" y="45" font-family="Arial, sans-serif" font-size="11" fill="#8891A2">Issued 19 min ago · Moderate</text>
      </g>
      <g transform="translate(20,210)">
        <rect width="320" height="66" rx="10" fill="#1C2230"/>
        <circle cx="26" cy="33" r="10" fill="#2DD4A0"/>
        <text x="48" y="27" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#F5F5F0">Shelter Opened — City Hall</text>
        <text x="48" y="45" font-family="Arial, sans-serif" font-size="11" fill="#8891A2">Issued 1 hr ago · Info</text>
      </g>
    </g>

    <!-- feature strip below hero -->
    <g transform="translate(0,542)">
      <rect x="0" y="0" width="1200" height="258" fill="#12161F"/>
      <text x="600" y="60" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#F5F5F0" text-anchor="middle">Built for the moments that matter</text>

      <g transform="translate(80,100)">
        <rect width="330" height="120" rx="12" fill="#151A24" stroke="#232938"/>
        <circle cx="40" cy="40" r="16" fill="#FF5533" opacity="0.2"/>
        <circle cx="40" cy="40" r="8" fill="#FF5533"/>
        <text x="70" y="36" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#F5F5F0">Instant WebSocket alerts</text>
        <text x="70" y="58" font-family="Arial, sans-serif" font-size="12" fill="#8891A2">Notifications arrive the second</text>
        <text x="70" y="74" font-family="Arial, sans-serif" font-size="12" fill="#8891A2">an event is reported.</text>
      </g>

      <g transform="translate(435,100)">
        <rect width="330" height="120" rx="12" fill="#151A24" stroke="#232938"/>
        <circle cx="40" cy="40" r="16" fill="#2DD4A0" opacity="0.2"/>
        <circle cx="40" cy="40" r="8" fill="#2DD4A0"/>
        <text x="70" y="36" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#F5F5F0">Emergency-first design</text>
        <text x="70" y="58" font-family="Arial, sans-serif" font-size="12" fill="#8891A2">Large, clear, one-hand-usable</text>
        <text x="70" y="74" font-family="Arial, sans-serif" font-size="12" fill="#8891A2">controls under stress.</text>
      </g>

      <g transform="translate(790,100)">
        <rect width="330" height="120" rx="12" fill="#151A24" stroke="#232938"/>
        <circle cx="40" cy="40" r="16" fill="#FFB238" opacity="0.2"/>
        <circle cx="40" cy="40" r="8" fill="#FFB238"/>
        <text x="70" y="36" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#F5F5F0">In-app relief donations</text>
        <text x="70" y="58" font-family="Arial, sans-serif" font-size="12" fill="#8891A2">Support recovery efforts</text>
        <text x="70" y="74" font-family="Arial, sans-serif" font-size="12" fill="#8891A2">without leaving the app.</text>
      </g>
    </g>
  </g>
</svg>
