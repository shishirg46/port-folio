<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBF3E4"/>
      <stop offset="100%" stop-color="#F5E9D3"/>
    </linearGradient>
    <clipPath id="pageClip2"><rect x="0" y="40" width="1200" height="760"/></clipPath>
  </defs>

  <!-- browser window frame -->
  <rect x="0" y="0" width="1200" height="800" rx="14" fill="#EFE6D2"/>
  <rect x="1" y="1" width="1198" height="798" rx="13" fill="none" stroke="#D8CBA9" stroke-width="1"/>

  <!-- browser chrome bar -->
  <rect x="0" y="0" width="1200" height="40" rx="14" fill="#F5EEDD"/>
  <rect x="0" y="26" width="1200" height="14" fill="#F5EEDD"/>
  <circle cx="24" cy="20" r="6" fill="#FF5F57"/>
  <circle cx="46" cy="20" r="6" fill="#FEBC2E"/>
  <circle cx="68" cy="20" r="6" fill="#28C840"/>
  <rect x="440" y="9" width="320" height="22" rx="11" fill="#EFE6D2"/>
  <text x="600" y="24" font-family="Arial, sans-serif" font-size="12" fill="#8A7A5C" text-anchor="middle">greenwoodhigh.edu</text>

  <g clip-path="url(#pageClip2)">
    <rect x="0" y="40" width="1200" height="760" fill="#FBF3E4"/>

    <!-- site nav -->
    <g transform="translate(0,40)">
      <rect x="0" y="0" width="1200" height="72" fill="#FBF3E4"/>
      <rect x="0" y="71" width="1200" height="1" fill="#E7D9B8"/>
      <rect x="52" y="20" width="32" height="32" rx="8" fill="#2B4539"/>
      <path d="M60,44 L68,28 L76,44 Z" fill="#F4B942"/>
      <text x="96" y="41" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#22303C">Greenwood High</text>

      <text x="500" y="41" font-family="Arial, sans-serif" font-size="15" fill="#5B6B62">Home</text>
      <text x="565" y="41" font-family="Arial, sans-serif" font-size="15" fill="#5B6B62">About</text>
      <text x="635" y="41" font-family="Arial, sans-serif" font-size="15" fill="#5B6B62">Gallery</text>
      <text x="712" y="41" font-family="Arial, sans-serif" font-size="15" fill="#5B6B62">Events</text>

      <rect x="1010" y="20" width="130" height="34" rx="17" fill="#E8735A"/>
      <text x="1075" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#FBF3E4" text-anchor="middle">Contact Us</text>
    </g>

    <!-- hero -->
    <rect x="0" y="112" width="1200" height="330" fill="url(#heroGrad2)"/>

    <g transform="translate(80,112)">
      <rect x="0" y="46" width="200" height="28" rx="14" fill="#FFF9EC" stroke="#F4B942" stroke-width="1"/>
      <text x="16" y="65" font-family="Arial, sans-serif" font-size="13" fill="#A9832B">Admissions open for 2026-27</text>

      <text x="0" y="148" font-family="Georgia, serif" font-size="46" font-weight="700" fill="#22303C">A warm welcome to</text>
      <text x="0" y="200" font-family="Georgia, serif" font-size="46" font-weight="700" fill="#22303C">Greenwood <tspan fill="#E8735A">High</tspan></text>

      <text x="0" y="240" font-family="Arial, sans-serif" font-size="16" fill="#5B6B62">Everything parents and students need, in one calm,</text>
      <text x="0" y="264" font-family="Arial, sans-serif" font-size="16" fill="#5B6B62">easy-to-browse place.</text>

      <rect x="0" y="292" width="168" height="46" rx="8" fill="#2B4539"/>
      <text x="84" y="320" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#FBF3E4" text-anchor="middle">View Gallery</text>

      <rect x="184" y="292" width="168" height="46" rx="8" fill="none" stroke="#B9A87E" stroke-width="1.5"/>
      <text x="268" y="320" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#22303C" text-anchor="middle">Event Calendar</text>
    </g>

    <!-- hero photo collage card -->
    <g transform="translate(690,150)">
      <rect width="430" height="260" rx="16" fill="#FFFFFF" stroke="#E7D9B8"/>
      <g transform="translate(18,18)">
        <rect width="188" height="108" rx="8" fill="#F4B942"/>
        <circle cx="40" cy="54" r="20" fill="#22303C" opacity="0.85"/>
        <rect x="200" y="0" width="176" height="108" rx="8" fill="#7FB0A6"/>
        <path d="M215,80 L245,45 L270,68 L295,35 L360,80 Z" fill="#22303C" opacity="0.5"/>
        <rect x="0" y="122" width="376" height="100" rx="8" fill="#E8735A"/>
        <text x="188" y="178" font-family="Georgia, serif" font-size="18" fill="#FBF3E4" text-anchor="middle" font-style="italic">Annual Sports Day 2026</text>
      </g>
    </g>

    <!-- quick links section -->
    <g transform="translate(0,442)">
      <rect x="0" y="0" width="1200" height="358" fill="#F5EEDD"/>
      <text x="600" y="66" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#22303C" text-anchor="middle">Everything in one place</text>
      <rect x="540" y="82" width="120" height="4" rx="2" fill="#F4B942"/>

      <g transform="translate(80,120)">
        <rect width="330" height="200" rx="14" fill="#FFFFFF" stroke="#E7D9B8"/>
        <rect x="24" y="24" width="56" height="56" rx="12" fill="#F4B94233"/>
        <rect x="40" y="40" width="24" height="24" rx="4" fill="#F4B942"/>
        <text x="24" y="108" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#22303C">Event Gallery</text>
        <text x="24" y="132" font-family="Arial, sans-serif" font-size="13" fill="#7A8B80">Photos from school events</text>
        <text x="24" y="150" font-family="Arial, sans-serif" font-size="13" fill="#7A8B80">and everyday activities.</text>
      </g>

      <g transform="translate(435,120)">
        <rect width="330" height="200" rx="14" fill="#FFFFFF" stroke="#E7D9B8"/>
        <rect x="24" y="24" width="56" height="56" rx="12" fill="#E8735A33"/>
        <rect x="38" y="38" width="28" height="26" rx="4" fill="none" stroke="#E8735A" stroke-width="3"/>
        <line x1="38" y1="46" x2="66" y2="46" stroke="#E8735A" stroke-width="3"/>
        <text x="24" y="108" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#22303C">Event Calendar</text>
        <text x="24" y="132" font-family="Arial, sans-serif" font-size="13" fill="#7A8B80">Upcoming activities and</text>
        <text x="24" y="150" font-family="Arial, sans-serif" font-size="13" fill="#7A8B80">important school dates.</text>
      </g>

      <g transform="translate(790,120)">
        <rect width="330" height="200" rx="14" fill="#FFFFFF" stroke="#E7D9B8"/>
        <rect x="24" y="24" width="56" height="56" rx="12" fill="#7FB0A633"/>
        <circle cx="52" cy="46" r="10" fill="#7FB0A6"/>
        <path d="M34,72 Q52,54 70,72" fill="#7FB0A6"/>
        <text x="24" y="108" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#22303C">Student &amp; Teacher Portal</text>
        <text x="24" y="132" font-family="Arial, sans-serif" font-size="13" fill="#7A8B80">Quick access to grades,</text>
        <text x="24" y="150" font-family="Arial, sans-serif" font-size="13" fill="#7A8B80">schedules, and resources.</text>
      </g>
    </g>
  </g>
</svg>
